<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaVas | Portal Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --neon-cyan: #00f3ff;
            --neon-green: #39ff14;
            --text-color: #e2e8f0;
        }
        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: 'Rajdhani', sans-serif;
        }
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 1px solid rgba(0, 243, 255, 0.2); background: rgba(10, 15, 29, 0.9);
        }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neon-cyan); margin: 0; }
        .btn-disconnect { background: transparent; border: 1px solid #ff0055; color: #ff0055; padding: 8px 15px; font-family: 'Orbitron', sans-serif; font-size: 11px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .btn-disconnect:hover { background: #ff0055; color: #000; box-shadow: 0 0 15px #ff0055; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .panel-box { background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(0, 243, 255, 0.15); border-radius: 12px; padding: 25px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .panel-box h3 { font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); margin-top: 0; border-bottom: 1px dashed rgba(0, 243, 255, 0.2); padding-bottom: 10px; }
        
        .input-cyber { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.2); padding: 12px; border-radius: 6px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        .input-cyber:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        
        .btn-cyber { width: 100%; background: linear-gradient(90deg, #0066ff, var(--neon-cyan)); border: none; color: white; padding: 12px; font-family: 'Orbitron', sans-serif; border-radius: 6px; cursor: pointer; font-size: 13px; letter-spacing: 1px; transition: 0.3s; }
        .btn-cyber:hover { box-shadow: 0 0 20px var(--neon-cyan); }
        
        .appointment-card { background: rgba(255, 255, 255, 0.02); border-left: 4px solid var(--neon-green); padding: 15px; margin-bottom: 12px; border-radius: 0 8px 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <header>
        <h1>PACIENTE_PORTAL // DAVAS</h1>
        <button class="btn-disconnect" onclick="logout()">LOGOUT</button>
    </header>

    <div class="dashboard">
        <!-- AGENDAR CITA -->
        <div class="panel-box">
            <h3>NUEVA_CITA_MÉDICA</h3>
            <form id="appointmentForm">
                <input type="date" id="date" class="input-cyber" required>
                <input type="time" id="time" class="input-cyber" required>
                <select id="service" class="input-cyber" style="color: #94a3b8;">
                    <option value="Consulta Diagnóstica">Consulta Diagnóstica</option>
                    <option value="Escaneo Ultrasónico (Limpieza)">Escaneo Ultrasónico (Limpieza)</option>
                    <option value="Alineación Dental (Ortodoncia)">Alineación Dental (Ortodoncia)</option>
                    <option value="Reconstrucción Estética">Reconstrucción Estética</option>
                </select>
                <button type="submit" class="btn-cyber">TRANSMITIR SOLICITUD</button>
            </form>
        </div>

        <!-- LISTA DE CITAS -->
        <div class="panel-box">
            <h3>LOG_DE_CITAS_RESERVADAS</h3>
            <div id="appointmentsLog">Cargando registros...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://bqyrzkjtbwiogjoquzki.supabase.co"; 
        const SUPABASE_ANON_KEY = "TU_CLAVE_ANON_REAL_AQUI"; // Reemplázala
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            loadAppointments();
        });

        async function loadAppointments() {
            const container = document.getElementById('appointmentsLog');
            const { data: citas, error } = await _supabase.from('citas').select('*').eq('id_paciente', currentUser.id);
            
            if (error || citas.length === 0) {
                container.innerHTML = "<p style='color:#64748b;'>No se encontraron transmisiones de citas activas.</p>";
                return;
            }
            container.innerHTML = '';
            citas.forEach(cita => {
                container.innerHTML += `
                    <div class="appointment-card">
                        <div>
                            <div style="font-weight:700; color:#fff;">${cita.servicio}</div>
                            <div style="color:#64748b; font-size:14px; margin-top:3px;">📅 ${cita.fecha} — ⏰ ${cita.hora}</div>
                        </div>
                        <div class="status-badge">${cita.estado.toUpperCase()}</div>
                    </div>
                `;
            });
        }

        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await _supabase.from('citas').insert([{
                id_paciente: currentUser.id,
                fecha: document.getElementById('date').value,
                hora: document.getElementById('time').value,
                servicio: document.getElementById('service').value,
                estado: 'pendiente'
            }]);
            if (error) alert("Error: " + error.message);
            else { alert("¡Cita agendada en la Matrix!"); loadAppointments(); }
        });

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
